# Where uploaded photos are committed, and the path used on the site.
media:
  input: assets/blog
  output: /assets/blog

content:
  - name: posts
    label: Blog Yazıları
    type: file
    path: data/posts.json
    format: json
    list: true
    fields:
      - name: title
        label: Başlık
        type: string
      - name: date
        label: Tarih
        type: date
        options:
          format: yyyy-MM-dd
      - name: cover
        label: Kapak görseli
        type: image
      - name: images
        label: Fotoğraflar (galeri)
        type: image
        list: true
      - name: body
        label: İçerik (metin)
        type: text
        description: "Boş bir satır yeni paragraf oluşturur."
